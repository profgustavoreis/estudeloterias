components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ApiError:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    LoteriaSummary:
      type: object
      properties:
        modalidade:
          type: string
        nome:
          type: string
        descricao:
          type: string
        cor:
          type: string
        ultimoConcurso:
          type: integer
        dataUltimoSorteio:
          type: string
        premioAcumulado:
          type: ["number", "null"]
        acumulado:
          type: boolean
        ganhadoresFaixa1:
          type: ["integer", "null"]
        valorPremioFaixa1:
          type: ["number", "null"]
        dezenas:
          type: array
          items:
            type: string
        dezenas2:
          type: array
          nullable: true
          items:
            type: string
        nomeEspecial:
          type: ["string", "null"]
        trevos:
          type: array
          nullable: true
          items:
            type: string
        dataProximoConcurso:
          type: ["string", "null"]
        valorEstimadoProximoConcurso:
          type: ["number", "null"]
        icone:
          type: string
      required:
        - modalidade
        - nome
        - descricao
        - cor
        - ultimoConcurso
        - dataUltimoSorteio
        - acumulado
        - dezenas
        - icone

    Resultado:
      type: object
      properties:
        concurso:
          type: integer
        data:
          type: string
        dezenas:
          type: array
          items:
            type: string
        premios:
          type: array
          items:
            $ref: "#/components/schemas/FaixaPremio"
        acumulado:
          type: boolean
        valorAcumulado:
          type: ["number", "null"]
        dataProximoConcurso:
          type: ["string", "null"]
        valorEstimadoProximoConcurso:
          type: ["number", "null"]
      required:
        - concurso
        - data
        - dezenas
        - premios
        - acumulado

    ResultadoMegaSena:
      type: object
      properties:
        concurso:
          type: integer
        data:
          type: string
        dezenas:
          type: array
          items:
            type: string
        dezenasOrdem:
          type: array
          nullable: true
          items:
            type: string
        premios:
          type: array
          items:
            $ref: "#/components/schemas/FaixaPremio"
        acumulado:
          type: boolean
        valorAcumulado:
          type: ["number", "null"]
        dataProximoConcurso:
          type: ["string", "null"]
        valorEstimadoProximoConcurso:
          type: ["number", "null"]
        local:
          type: ["string", "null"]
        localGanhadores:
          type: ["string", "null"]
        arrecadacaoTotal:
          type: ["number", "null"]
        valorAcumuladoConcurso_0_5:
          type: ["number", "null"]
        valorAcumuladoConcursoEspecial:
          type: ["number", "null"]
      required:
        - concurso
        - data
        - dezenas
        - premios
        - acumulado

    FaixaPremio:
      type: object
      properties:
        faixa:
          type: integer
        descricao:
          type: string
        ganhadores:
          type: integer
        valorPremio:
          type: number
      required:
        - faixa
        - descricao
        - ganhadores
        - valorPremio

    ResultadosPaginados:
      type: object
      properties:
        total:
          type: integer
        pagina:
          type: integer
        limite:
