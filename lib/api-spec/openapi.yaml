openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Estude Loterias API - Estatísticas e ferramentas para loterias da Caixa
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: loterias
    description: Loterias e resultados
  - name: mega-sena
    description: Mega-Sena específico
  - name: lotofacil
    description: Lotofácil específico
  - name: quina
    description: Quina específico
  - name: lotomania
    description: Lotomania específico
  - name: timemania
    description: Timemania específico
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /loterias:
    get:
      operationId: getLoterias
      tags: [loterias]
      summary: Lista todas as modalidades de loterias com último resultado
      responses:
        "200":
          description: Lista de loterias
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/LoteriaSummary"

  /loterias/{modalidade}/resultado/ultimo:
    get:
      operationId: getUltimoResultado
      tags: [loterias]
      summary: Último resultado de uma loteria
      parameters:
        - name: modalidade
          in: path
          required: true
          schema:
            type: string
            enum:
              - megasena
              - lotofacil
              - quina
              - duplasena
              - diadesorte
              - supersete
              - lotomania
              - timemania
              - maismilionaria
      responses:
        "200":
          description: Último resultado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Resultado"
        "404":
          description: Loteria não encontrada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /mega-sena/resultado/ultimo:
    get:
      operationId: getMegaSenaUltimoResultado
      tags: [mega-sena]
      summary: Último resultado da Mega-Sena
      responses:
        "200":
          description: Último resultado da Mega-Sena
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResultadoMegaSena"

  /mega-sena/resultados:
    get:
      operationId: getMegaSenaResultados
      tags: [mega-sena]
      summary: Histórico de resultados da Mega-Sena
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: ano
          in: query
          schema:
            type: ["integer", "null"]
        - name: ordem
          in: query
          schema:
            type: string
            enum: [asc, desc]
            default: desc
      responses:
        "200":
          description: Lista paginada de resultados
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResultadosPaginados"

  /mega-sena/resultados/{concurso}:
    get:
      operationId: getMegaSenaResultadoConcurso
      tags: [mega-sena]
      summary: Resultado de um concurso específico da Mega-Sena
      parameters:
        - name: concurso
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Resultado do concurso
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResultadoMegaSena"
        "404":
          description: Concurso não encontrado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /mega-sena/estatisticas:
    get:
      operationId: getMegaSenaEstatisticas
      tags: [mega-sena]
      summary: Estatísticas da Mega-Sena (frequência de dezenas, etc.)
      responses:
        "200":
          description: Estatísticas completas
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EstatisticasMegaSena"

  /mega-sena/mega-da-virada:
    get:
      operationId: getMegaDaVirada
      tags: [mega-sena]
      summary: Informações e histórico da Mega da Virada
      responses:
        "200":
          description: Informações da Mega da Virada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MegaDaVirada"

  /mega-sena/resumo:
    get:
      operationId: getMegaSenaResumo
      tags: [mega-sena]
      summary: Resumo agregado - prêmio acumulado, total de sorteios, maior prêmio
      responses:
        "200":
          description: Resumo da Mega-Sena
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResumoMegaSena"

  /mega-sena/simulador:
    post:
      operationId: simularMegaSena
      tags: [mega-sena]
      summary: Simula uma aposta em todos os concursos anteriores da Mega-Sena
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SimuladorInput"
      responses:
        "200":
          description: Resultado da simulação
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SimulacaoResultado"

  /mega-sena/gerador:
    post:
      operationId: gerarJogo
      tags: [mega-sena]
      summary: Gera um jogo aleatório de Mega-Sena
      requestBody:
        required: true
