openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Estude Loterias API - Estatísticas e ferramentas para loterias da Caixa
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: loterias
    description: Loterias e resultados
  - name: mega-sena
    description: Mega-Sena específico
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /loterias:
    get:
      operationId: getLoterias
      tags: [loterias]
      summary: Lista todas as modalidades de loterias com último resultado
      responses:
        "200":
          description: Lista de loterias
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/LoteriaSummary"

  /loterias/{modalidade}/resultado/ultimo:
    get:
      operationId: getUltimoResultado
      tags: [loterias]
      summary: Último resultado de uma loteria
      parameters:
        - name: modalidade
          in: path
          required: true
          schema:
            type: string
            enum:
              - megasena
              - lotofacil
              - quina
              - duplasena
              - diadesorte
              - supersete
              - lotomania
              - timemania
              - maismilionaria
      responses:
        "200":
          description: Último resultado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Resultado"
        "404":
          description: Loteria não encontrada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /mega-sena/resultado/ultimo:
    get:
      operationId: getMegaSenaUltimoResultado
      tags: [mega-sena]
      summary: Último resultado da Mega-Sena
      responses:
        "200":
          description: Último resultado da Mega-Sena
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResultadoMegaSena"

  /mega-sena/resultados:
    get:
      operationId: getMegaSenaResultados
      tags: [mega-sena]
      summary: Histórico de resultados da Mega-Sena
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: ano
          in: query
          schema:
            type: ["integer", "null"]
      responses:
        "200":
          description: Lista paginada de resultados
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResultadosPaginados"

  /mega-sena/resultados/{concurso}:
    get:
      operationId: getMegaSenaResultadoConcurso
      tags: [mega-sena]
      summary: Resultado de um concurso específico da Mega-Sena
      parameters:
        - name: concurso
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Resultado do concurso
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResultadoMegaSena"
        "404":
          description: Concurso não encontrado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /mega-sena/estatisticas:
    get:
      operationId: getMegaSenaEstatisticas
      tags: [mega-sena]
      summary: Estatísticas da Mega-Sena (frequência de dezenas, etc.)
      responses:
        "200":
          description: Estatísticas completas
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EstatisticasMegaSena"

  /mega-sena/calendario:
    get:
      operationId: getMegaSenaCalendario
      tags: [mega-sena]
      summary: Próximos sorteios da Mega-Sena
      responses:
        "200":
          description: Calendário de sorteios
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Sorteio"

  /mega-sena/mega-da-virada:
    get:
      operationId: getMegaDaVirada
      tags: [mega-sena]
      summary: Informações e histórico da Mega da Virada
      responses:
        "200":
          description: Informações da Mega da Virada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MegaDaVirada"

  /mega-sena/resumo:
    get:
      operationId: getMegaSenaResumo
      tags: [mega-sena]
      summary: Resumo agregado - prêmio acumulado, total de sorteios, maior prêmio
      responses:
        "200":
          description: Resumo da Mega-Sena
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResumoMegaSena"

  /mega-sena/gerador:
    post:
      operationId: gerarJogo
      tags: [mega-sena]
      summary: Gera um jogo aleatório de Mega-Sena
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GeradorInput"
      responses:
        "200":
          description: Jogo(s) gerado(s)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JogoGerado"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ApiError:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    LoteriaSummary:
      type: object
      properties:
        modalidade:
          type: string
        nome:
          type: string
        descricao:
          type: string
        cor:
          type: string
        ultimoConcurso:
          type: integer
        dataUltimoSorteio:
          type: string
        premioAcumulado:
          type: ["number", "null"]
        acumulado:
          type: boolean
        dezenas:
          type: array
          items:
            type: string
        icone:
          type: string
      required:
        - modalidade
        - nome
        - descricao
        - cor
        - ultimoConcurso
        - dataUltimoSorteio
        - acumulado
        - dezenas
        - icone

    Resultado:
      type: object
      properties:
        concurso:
          type: integer
        data:
          type: string
        dezenas:
          type: array
          items:
            type: string
        premios:
          type: array
          items:
            $ref: "#/components/schemas/FaixaPremio"
        acumulado:
          type: boolean
        valorAcumulado:
          type: ["number", "null"]
        dataProximoConcurso:
          type: ["string", "null"]
        valorEstimadoProximoConcurso:
          type: ["number", "null"]
      required:
        - concurso
        - data
        - dezenas
        - premios
        - acumulado

    ResultadoMegaSena:
      type: object
      properties:
        concurso:
          type: integer
        data:
          type: string
        dezenas:
          type: array
          items:
            type: string
        premios:
          type: array
          items:
            $ref: "#/components/schemas/FaixaPremio"
        acumulado:
          type: boolean
        valorAcumulado:
          type: ["number", "null"]
        dataProximoConcurso:
          type: ["string", "null"]
        valorEstimadoProximoConcurso:
          type: ["number", "null"]
        local:
          type: ["string", "null"]
        localGanhadores:
          type: ["string", "null"]
        arrecadacaoTotal:
          type: ["number", "null"]
      required:
        - concurso
        - data
        - dezenas
        - premios
        - acumulado

    FaixaPremio:
      type: object
      properties:
        faixa:
          type: integer
        descricao:
          type: string
        ganhadores:
          type: integer
        valorPremio:
          type: number
      required:
        - faixa
        - descricao
        - ganhadores
        - valorPremio

    ResultadosPaginados:
      type: object
      properties:
        total:
          type: integer
        pagina:
          type: integer
        limite:
          type: integer
        totalPaginas:
          type: integer
        resultados:
          type: array
          items:
            $ref: "#/components/schemas/ResultadoMegaSena"
      required:
        - total
        - pagina
        - limite
        - totalPaginas
        - resultados

    EstatisticasMegaSena:
      type: object
      properties:
        totalConcursos:
          type: integer
        frequenciaDezenas:
          type: array
          items:
            $ref: "#/components/schemas/FrequenciaDezena"
        atrasoMaiores:
          type: array
          items:
            $ref: "#/components/schemas/FrequenciaDezena"
        maiorSequencia:
          type: integer
        mediaDezenasAcumulado:
          type: number
        totalAcumulados:
          type: integer
        percentualAcumulado:
          type: number
        maiorPremio:
          type: number
        maiorPremioData:
          type: string
        maiorPremioConcurso:
          type: integer
      required:
        - totalConcursos
        - frequenciaDezenas
        - atrasoMaiores
        - totalAcumulados
        - percentualAcumulado
        - maiorPremio
        - maiorPremioData
        - maiorPremioConcurso

    FrequenciaDezena:
      type: object
      properties:
        dezena:
          type: string
        frequencia:
          type: integer
        percentual:
          type: number
        ultimoConcurso:
          type: ["integer", "null"]
        atraso:
          type: integer
      required:
        - dezena
        - frequencia
        - percentual
        - atraso

    Sorteio:
      type: object
      properties:
        data:
          type: string
        diaSemana:
          type: string
        concursoEstimado:
          type: ["integer", "null"]
        valorEstimado:
          type: ["number", "null"]
        especial:
          type: boolean
        descricao:
          type: ["string", "null"]
      required:
        - data
        - diaSemana
        - especial

    MegaDaVirada:
      type: object
      properties:
        anoAtual:
          type: integer
        dataProximaVirada:
          type: string
        valorEstimado:
          type: ["number", "null"]
        historico:
          type: array
          items:
            $ref: "#/components/schemas/ResultadoMegaSena"
      required:
        - anoAtual
        - dataProximaVirada
        - historico

    ResumoMegaSena:
      type: object
      properties:
        totalConcursos:
          type: integer
        acumulado:
          type: boolean
        valorAtualAcumulado:
          type: ["number", "null"]
        valorEstimadoProximo:
          type: ["number", "null"]
        maiorPremio:
          type: number
        maiorPremioConcurso:
          type: integer
        maiorPremioAno:
          type: integer
        totalGanhadores6:
          type: integer
        proximoSorteio:
          type: ["string", "null"]
        ultimoConcurso:
          type: integer
      required:
        - totalConcursos
        - acumulado
        - maiorPremio
        - maiorPremioConcurso
        - maiorPremioAno
        - totalGanhadores6
        - ultimoConcurso

    GeradorInput:
      type: object
      properties:
        quantidadeJogos:
          type: integer
          minimum: 1
          maximum: 20
          default: 1
        quantidadeDezenas:
          type: integer
          minimum: 6
          maximum: 15
          default: 6
      required:
        - quantidadeJogos
        - quantidadeDezenas

    JogoGerado:
      type: object
      properties:
        jogos:
          type: array
          items:
            type: array
            items:
              type: integer
        custo:
          type: number
      required:
        - jogos
        - custo
